      background: linear-gradient(90deg, var(--accent), #6b8cff);

      border: 1px solid var(--line);
      background: white;

      padding: 14px;

      font-size: .88rem;

      color: #b54708;
    }

      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
    }
    .matrix table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      text-align: left;
      vertical-align: top;

    .matrix tr:last-child td { border-bottom: none; }
    .matrix th {
      background: #f8faff;
      font-size: .88rem;
      color: var(--muted);

      gap: 12px;

    .ranking-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
      align-items: center;
    }
    .rank-label {

      color: var(--accent-2);
    }
    .file-box {

      gap: 12px;

    .file-note {

      font-size: .92rem;

      .ranking-row { grid-template-columns: 1fr; }

</head>

    const app = document.getElementById("app");

    let answers = loadJson(STORAGE_KEY, {});
    let uiState = loadJson(APP_STATE_KEY, { screen: "welcome", currentSectionId: "A" });
    let lastError = "";

    function loadJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
      localStorage.setItem(APP_STATE_KEY, JSON.stringify(uiState));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatAnswerValue(value) {
      if (value === undefined || value === null || value === "") return "—";
      if (Array.isArray(value)) return value.length ? value.join(", ") : "—";
      if (typeof value === "object") return "Registrado";
      return String(value);
    }

    function nowBogotaIso() {
      const now = new Date();
      return now.toISOString();
    }

    function uuid() {
      if (crypto?.randomUUID) return crypto.randomUUID();
      return "sub_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function slug(value) {
      return String(value ?? "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "")
        .slice(0, 60);
    }

    function optionLabel(question, value) {
      const found = (question.options || []).find(o => o.value === value);
      return found ? found.label : value;
    }

    function getAnswer(questionId) {
      return answers[questionId]?.value;
    }

    function setAnswer(question, value, extra = {}, rerender = false) {
      answers[question.id] = {
        id: question.id,
        key: question.key,
        type: question.type,
        label: question.label,
        value,
        ...extra
      };
      saveState();
      if (rerender) render();
    }

    function setPartialComplexAnswer(question, patch) {
      const current = answers[question.id]?.value || {};
      setAnswer(question, { ...current, ...patch });
    }

    function getSelectedModules() {
      const area = getAnswer("A-03");
      const declaredModules = getAnswer("A-08") || [];
      const selected = new Set();

      Object.values(SCHEMA.module_routing).forEach(route => {
        if ((route.area_values || []).includes(area)) selected.add(route.section_id);
        if (declaredModules.includes(route.module_value)) selected.add(route.section_id);
      });

      return [...selected];
    }

    function getVisibleSections() {
      const selectedModuleSectionIds = new Set(getSelectedModules());
      return SCHEMA.sections.filter(section => {
        if (section.category !== "module") return true;
        return selectedModuleSectionIds.has(section.id);
      });
    }

    function isQuestionVisible(question) {
      const visibility = question.visibility || { mode: "always" };
      if (visibility.mode === "always") return true;
      const answer = getAnswer(visibility.question_id);
      if (visibility.operator === "equals") return answer === visibility.value;
      if (visibility.operator === "in") return (visibility.values || []).includes(answer);
      return true;
    }

    function visibleQuestions(section) {
      return section.questions.filter(isQuestionVisible);
    }

    function getCurrentSection() {
      const sections = getVisibleSections();
      const found = sections.find(section => section.id === uiState.currentSectionId);
      if (found) return found;
      uiState.currentSectionId = sections[0]?.id || "A";
      saveState();
      return sections[0];
    }

    function answered(question) {
      const value = getAnswer(question.id);
      if (question.type === "ranking") {
        return Array.isArray(value) && value.length === 5 && new Set(value).size === 5 && value.every(Boolean);
      }
      if (question.type === "matrix_scale") {
        return value && typeof value === "object" && Object.keys(value).length > 0;
      }
      if (question.type === "role_permission_matrix") {
        return value && typeof value === "object" && Object.keys(value).length > 0;
      }
      if (question.type === "file_optional") {
        return value && (value.description || (value.file_names || []).length);
      }
      if (Array.isArray(value)) return value.length > 0;
      return value !== undefined && value !== null && String(value).trim() !== "";
    }

    function completionStats() {
      const sections = getVisibleSections();
      const questions = sections.flatMap(visibleQuestions);
      const required = questions.filter(q => q.required);
      const requiredAnswered = required.filter(answered).length;
      const totalVisible = questions.length;
      const totalAnswered = questions.filter(answered).length;
      const percentage = required.length ? Math.round((requiredAnswered / required.length) * 100) : 0;
      return { totalVisible, totalAnswered, required: required.length, requiredAnswered, percentage };
    }

    function sectionStats(section) {
      const qs = visibleQuestions(section);
      const req = qs.filter(q => q.required);
      const reqAnswered = req.filter(answered).length;
      return {
        total: qs.length,
        answered: qs.filter(answered).length,
        required: req.length,
        requiredAnswered: reqAnswered,
        complete: req.length === 0 ? qs.some(answered) : req.length === reqAnswered
      };
    }

    function validationErrorsForSection(section) {
      const qs = visibleQuestions(section);
      const errors = [];
      qs.forEach(question => {
        if (question.required && !answered(question)) {
          errors.push(`${question.id}: ${question.label}`);
        }
      });
      return errors;
    }

    function finalValidationErrors() {
      const errors = [];
      getVisibleSections().forEach(section => {
        validationErrorsForSection(section).forEach(item => errors.push(item));
      });
      const t1 = String(getAnswer("T-01") || "").trim();
      const t2 = String(getAnswer("T-02") || "").trim();
      if (!t1 && !t2) {
        errors.push("T-01 o T-02: complete al menos uno de los campos de cierre.");
      }
      return errors;
    }

    function renderQuestionnaire() {
      const current = getCurrentSection();
      const sections = getVisibleSections();
      const stats = completionStats();
      const currentIndex = sections.findIndex(s => s.id === current.id);
      const errorsHtml = lastError ? `<div class="error-box">${escapeHtml(lastError)}</div>` : "";

      app.innerHTML = `
        <section class="wizard">
          <aside class="card sidebar">
            <h3>Avance</h3>
            <p>Responda con base en la operación real, no en el proceso ideal.</p>
            <div class="progress-track"><div class="progress-bar" style="width:${stats.percentage}%"></div></div>
            <div class="progress-copy">${stats.requiredAnswered}/${stats.required} campos obligatorios visibles completados · ${stats.percentage}%</div>
            <div class="section-list">
              ${sections.map(section => {
                const s = sectionStats(section);
                return `
                  <button class="section-pill ${section.id === current.id ? "active" : ""}" data-section="${section.id}" type="button">
                    ${escapeHtml(section.id)} · ${escapeHtml(section.title)}
                    <span class="small">${s.answered}/${s.total} respuestas visibles</span>
                  </button>
                `;
              }).join("")}
            </div>
          </aside>

          <article class="card main-card">
            <div class="eyebrow">Sección ${escapeHtml(current.id)}</div>
            <h2>${escapeHtml(current.title)}</h2>
            <p class="intro">${escapeHtml(current.description || "")}</p>
            ${errorsHtml}
            <div id="questionsMount">
              ${visibleQuestions(current).map(renderQuestion).join("")}
            </div>
            <div class="nav-row">
              <div class="nav-left">
                <button class="secondary-btn" type="button" id="welcomeBtn">Inicio</button>
                <button class="secondary-btn" type="button" id="prevBtn" ${currentIndex === 0 ? "disabled" : ""}>Anterior</button>
              </div>
              <div class="nav-right">
                <button class="secondary-btn" type="button" id="reviewBtn">Revisar</button>
                <button class="btn" type="button" id="nextBtn">${currentIndex === sections.length - 1 ? "Ir a revisión" : "Siguiente"}</button>
              </div>
            </div>
          </article>
        </section>
      `;

      wireQuestionEvents(current);

      document.querySelectorAll("[data-section]").forEach(btn => {
        btn.onclick = () => {
          uiState.currentSectionId = btn.dataset.section;
          lastError = "";
          saveState();
          render();
        };
      });

      document.getElementById("welcomeBtn").onclick = () => {
        uiState.screen = "welcome";
        lastError = "";
        saveState();
        render();
      };

      document.getElementById("reviewBtn").onclick = () => {
        uiState.screen = "review";
        lastError = "";
        saveState();
        render();
      };

      document.getElementById("prevBtn").onclick = () => {
        if (currentIndex > 0) {
          uiState.currentSectionId = sections[currentIndex - 1].id;
          lastError = "";
          saveState();
          render();
        }
      };

      document.getElementById("nextBtn").onclick = () => {
        const errors = validationErrorsForSection(current);
        if (errors.length) {
          lastError = `Complete antes los campos obligatorios de esta sección: ${errors.join(" · ")}`;
          render();
          return;
        }
        lastError = "";
        if (currentIndex < sections.length - 1) {
          uiState.currentSectionId = sections[currentIndex + 1].id;
          saveState();
          render();
        } else {
          uiState.screen = "review";
          saveState();
          render();
        }
      };

    function renderQuestion(question) {
      const required = question.required ? `<span class="required">*</span>` : "";
      const help = question.help_text ? `<p class="help">${escapeHtml(question.help_text)}</p>` : "";
      return `
        <section class="question" data-question-block="${question.id}">
          <label class="heading">${escapeHtml(question.id)}. ${escapeHtml(question.label)} ${required}</label>
          ${help}
          ${renderInput(question)}
        </section>
      `;
    }

    function renderInput(question) {
      const value = getAnswer(question.id);
      switch (question.type) {
        case "text":
          return `<input data-q="${question.id}" data-kind="text" type="text" value="${escapeHtml(value || "")}" placeholder="${escapeHtml(question.placeholder || "")}" />`;
        case "number":
          return `<input data-q="${question.id}" data-kind="number" type="number" min="${question.validation?.min ?? 0}" value="${escapeHtml(value ?? "")}" />`;
        case "textarea":
          return `<textarea data-q="${question.id}" data-kind="textarea" placeholder="${escapeHtml(question.placeholder || "")}">${escapeHtml(value || "")}</textarea>`;
        case "single_select":
        case "yes_no_na":
        case "yes_no_unsure":
          return renderSingleSelect(question, value);
        case "multi_select":
          return renderMultiSelect(question, value || []);
        case "scale_1_5":
          return renderSingleSelect(question, value);
        case "ranking":
          return renderRanking(question, value || ["","","","",""]);
        case "matrix_scale":
          return renderMatrixScale(question, value || {});
        case "role_permission_matrix":
          return renderRolePermissionMatrix(question, value || {});
        case "file_optional":
          return renderFileOptional(question, value || {});
        default:
          return `<textarea data-q="${question.id}" data-kind="textarea">${escapeHtml(value || "")}</textarea>`;
      }
    }

    function renderSingleSelect(question, value) {
      return `
        <select data-q="${question.id}" data-kind="single_select">
          <option value="">Seleccione una opción</option>
          ${(question.options || []).map(option => `
            <option value="${escapeHtml(option.value)}" ${value === option.value ? "selected" : ""}>${escapeHtml(option.label)}</option>
          `).join("")}
        </select>
      `;
    }

    function renderMultiSelect(question, values) {
      const selected = new Set(values || []);
      const otherKey = `${question.id}__other`;
      const otherValue = getAnswer(otherKey) || "";
      return `
        <div class="choice-grid">
          ${(question.options || []).map(option => `
            <label class="choice">
              <input data-q="${question.id}" data-kind="multi_select" type="checkbox" value="${escapeHtml(option.value)}" ${selected.has(option.value) ? "checked" : ""} />
              <span>${escapeHtml(option.label)}</span>
            </label>
          `).join("")}
        </div>
        ${question.allow_other ? `
          <div class="inline-other">
            <input data-q="${otherKey}" data-kind="other_text" type="text" value="${escapeHtml(otherValue)}" placeholder="Otro: especifique" />
          </div>
        ` : ""}
      `;
    }

    function renderRanking(question, values) {
      const normalized = Array.isArray(values) ? [...values] : ["","","","",""];
      while (normalized.length < 5) normalized.push("");
      return `
        <div class="ranking-grid">
          ${[0,1,2,3,4].map(index => `
            <div class="ranking-row">
              <div class="rank-label">Prioridad ${index + 1}</div>
              <select data-q="${question.id}" data-kind="ranking" data-rank-index="${index}">
                <option value="">Seleccione un problema</option>
                ${(question.options || []).map(option => `
                  <option value="${escapeHtml(option.value)}" ${normalized[index] === option.value ? "selected" : ""}>${escapeHtml(option.label)}</option>
                `).join("")}
              </select>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderMatrixScale(question, value) {
      const selectedProblems = getAnswer("K-01") || [];
      if (!selectedProblems.length) {
        return `<p class="help">Primero priorice los problemas en K-01 para habilitar esta matriz.</p>`;
      }
      return `
        <div class="matrix">
          <table>
            <thead>
              <tr>
                <th>Problema priorizado</th>
                ${MATRIX_DIMENSIONS.map(d => `<th>${escapeHtml(d)}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${selectedProblems.filter(Boolean).map(problem => `
                <tr>
                  <td>${escapeHtml(labelFromK01(problem))}</td>
                  ${MATRIX_DIMENSIONS.map(dim => {
                    const current = value?.[problem]?.[dim] || "";
                    return `
                      <td>
                        <select data-q="${question.id}" data-kind="matrix_scale" data-problem="${escapeHtml(problem)}" data-dim="${escapeHtml(dim)}">
                          <option value="">—</option>
                          ${["1","2","3","4","5"].map(score => `<option value="${score}" ${current === score ? "selected" : ""}>${score}</option>`).join("")}
                        </select>
                      </td>
                    `;
                  }).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function labelFromK01(value) {
      const q = SCHEMA.sections.flatMap(s => s.questions).find(item => item.id === "K-01");
      return optionLabel(q, value);
    }

    function renderRolePermissionMatrix(question, value) {
      return `
        <div class="matrix">
          <table>
            <thead>
              <tr>
                <th>Acción</th>
                ${ROLES.map(role => `<th>${escapeHtml(role)}</th>`).join("")}

            </thead>
            <tbody>
              ${PERMISSION_ACTIONS.map(action => `
                <tr>
                  <td>${escapeHtml(action)}</td>
                  ${ROLES.map(role => {
                    const checked = value?.[action]?.includes(role) ? "checked" : "";
                    return `
                      <td>
                        <input type="checkbox" data-q="${question.id}" data-kind="role_permission_matrix" data-action="${escapeHtml(action)}" data-role="${escapeHtml(role)}" ${checked} />
                      </td>
                    `;
                  }).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderFileOptional(question, value) {
      const description = value.description || "";
      const fileNames = value.file_names || [];
      return `
        <div class="file-box">
          <textarea data-q="${question.id}" data-kind="file_description" placeholder="Describa el material o referencia que desea aportar">${escapeHtml(description)}</textarea>
          <input data-q="${question.id}" data-kind="file_names" type="file" multiple />
          <p class="file-note">Archivos seleccionados: ${fileNames.length ? escapeHtml(fileNames.join(", ")) : "ninguno"}. El JSON conserva solo los nombres, no el contenido binario.</p>
        </div>
      `;
    }

    function wireQuestionEvents(section) {
      visibleQuestions(section).forEach(question => {
        document.querySelectorAll(`[data-q="${question.id}"]`).forEach(el => {
          const kind = el.dataset.kind;
          if (kind === "text" || kind === "textarea") {
            el.oninput = event => setAnswer(question, event.target.value);
          } else if (kind === "number") {
            el.oninput = event => setAnswer(question, event.target.value === "" ? "" : Number(event.target.value));
          } else if (kind === "single_select") {
            el.onchange = event => setAnswer(question, event.target.value, {}, true);
          } else if (kind === "multi_select") {
            el.onchange = () => {
              const values = [...document.querySelectorAll(`[data-q="${question.id}"][data-kind="multi_select"]:checked`)].map(item => item.value);
              setAnswer(question, values, {}, true);
            };
          } else if (kind === "ranking") {
            el.onchange = () => {
              const selects = [...document.querySelectorAll(`[data-q="${question.id}"][data-kind="ranking"]`)];
              const values = selects.map(item => item.value);
              setAnswer(question, values, {}, true);
            };
          } else if (kind === "matrix_scale") {
            el.onchange = () => {
              const selects = [...document.querySelectorAll(`[data-q="${question.id}"][data-kind="matrix_scale"]`)];
              const matrix = {};
              selects.forEach(item => {
                const problem = item.dataset.problem;
                const dim = item.dataset.dim;
                if (!matrix[problem]) matrix[problem] = {};
                if (item.value) matrix[problem][dim] = item.value;
              });
              setAnswer(question, matrix);
            };
          } else if (kind === "role_permission_matrix") {
            el.onchange = () => {
              const checks = [...document.querySelectorAll(`[data-q="${question.id}"][data-kind="role_permission_matrix"]:checked`)];
              const matrix = {};
              checks.forEach(item => {
                const action = item.dataset.action;
                const role = item.dataset.role;
                if (!matrix[action]) matrix[action] = [];
                matrix[action].push(role);
              });
              setAnswer(question, matrix);
            };
          } else if (kind === "file_description") {
            el.oninput = event => {
              const current = answers[question.id]?.value || {};
              setAnswer(question, { ...current, description: event.target.value });
            };
          } else if (kind === "file_names") {
            el.onchange = event => {
              const current = answers[question.id]?.value || {};
              const names = [...event.target.files].map(file => file.name);
              setAnswer(question, { ...current, file_names: names }, {}, true);
            };
          }
        });

        if (question.allow_other) {
          const otherKey = `${question.id}__other`;
          const otherEl = document.querySelector(`[data-q="${otherKey}"]`);
          if (otherEl) {
            otherEl.oninput = event => {
              const pseudo = {
                id: otherKey,
                key: `${question.key}_other`,
                type: "text",
                label: `${question.label} — Otro`
              };
              setAnswer(pseudo, event.target.value);
            };
          }
        }
      });
    }

    function renderReview() {
      const sections = getVisibleSections();
      const stats = completionStats();
      const errors = finalValidationErrors();
      const errorsHtml = errors.length ? `
        <div class="error-box">
          <strong>Antes de exportar, revise estos puntos:</strong><br />
          ${errors.map(error => `• ${escapeHtml(error)}`).join("<br />")}
        </div>
      ` : `
        <div class="success-box">
          El formulario cumple las validaciones obligatorias visibles y está listo para descargar en JSON.
        </div>
      `;

      app.innerHTML = `
        <article class="card main-card">
          <div class="eyebrow">Revisión final</div>
          <h2>Resumen de diligenciamiento</h2>
          <p class="intro">
            Revise el estado general antes de descargar el archivo. El JSON conservará respuestas,
            módulos renderizados y metadata de completitud.
          </p>
          ${errorsHtml}
          <div class="summary-grid">
            <div class="summary-card">
              <h3>Avance obligatorio</h3>
              <p>${stats.requiredAnswered}/${stats.required} campos obligatorios · ${stats.percentage}%</p>
            </div>
            <div class="summary-card">
              <h3>Preguntas visibles</h3>
              <p>${stats.totalAnswered}/${stats.totalVisible} respondidas</p>
            </div>
            <div class="summary-card">
              <h3>Módulos activados</h3>
              <p>${getSelectedModules().length ? getSelectedModules().join(", ") : "Solo bloque común"}</p>
            </div>
          </div>

          <table class="review-table">
            <thead>
              <tr>
                <th>Sección</th>
                <th>Estado</th>
                <th>Respuestas</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${sections.map(section => {
                const s = sectionStats(section);
                return `
                  <tr>
                    <td><strong>${escapeHtml(section.id)} · ${escapeHtml(section.title)}</strong></td>
                    <td><span class="chip ${s.complete ? "" : "pending"}">${s.complete ? "En regla" : "Pendiente"}</span></td>
                    <td>${s.answered}/${s.total}</td>
                    <td><button class="ghost-btn" data-edit-section="${section.id}" type="button">Editar</button></td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>

          <div class="review-actions">
            <div>
              <button class="secondary-btn" id="backToFormBtn" type="button">Volver al formulario</button>
            </div>
            <div>
              <button class="secondary-btn" id="downloadDraftBtn" type="button">Descargar borrador JSON</button>
              <button class="btn" id="downloadFinalBtn" type="button" ${errors.length ? "disabled" : ""}>Descargar JSON final</button>
            </div>
          </div>
        </article>
      `;

      document.querySelectorAll("[data-edit-section]").forEach(btn => {
        btn.onclick = () => {
          uiState.screen = "questionnaire";
          uiState.currentSectionId = btn.dataset.editSection;
          saveState();
          render();
        };
      });

      document.getElementById("backToFormBtn").onclick = () => {
        uiState.screen = "questionnaire";
        saveState();
        render();
      };

      document.getElementById("downloadDraftBtn").onclick = () => downloadJson(false);
      const finalBtn = document.getElementById("downloadFinalBtn");
      if (finalBtn) finalBtn.onclick = () => downloadJson(true);
    }

    function exportPayload(isFinal) {
      const visibleSections = getVisibleSections();
      const selectedModules = getSelectedModules();
      const stats = completionStats();
      const respondent = {
        full_name: getAnswer("A-01") || "",
        job_title: getAnswer("A-02") || "",
        area: getAnswer("A-03") || "",
        tenure: getAnswer("A-04") || "",
        document_interaction_level: getAnswer("A-05") || ""
      };

      return {
        submission_id: uuid(),
        export_status: isFinal ? "final" : "draft",
        questionnaire: {
          id: SCHEMA.questionnaire_id,
          version: SCHEMA.version,
          title: SCHEMA.title,
          language: SCHEMA.language
        },
        submitted_at: nowBogotaIso(),
        timezone_reference: "America/Bogota",
        respondent,
        routing: {
          selected_module_sections: selectedModules,
          rendered_sections: visibleSections.map(section => section.id)
        },
        answers,
        completion: {
          visible_questions: stats.totalVisible,
          answered_questions: stats.totalAnswered,
          required_questions: stats.required,
          required_answered: stats.requiredAnswered,
          completion_percentage: stats.percentage
        }
      };
    }

    function safeFilenamePart(value) {
      return String(value || "participante")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "")
        .slice(0, 48) || "participante";
    }

    function downloadJson(isFinal) {
      const payload = exportPayload(isFinal);
      const raw = JSON.stringify(payload, null, 2);
      const blob = new Blob([raw], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const participant = safeFilenamePart(getAnswer("A-01") || getAnswer("A-03") || "participante");
      const today = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `${isFinal ? "respuestas" : "borrador"}_rrhh_documental_${participant}_${today}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function resetAnswers() {
      const confirmed = window.confirm("¿Desea borrar todas las respuestas guardadas en este navegador?");
      if (!confirmed) return;
      answers = {};
      uiState = { screen: "welcome", currentSectionId: "A" };
      lastError = "";
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(APP_STATE_KEY);
      render();
    }

    resetTopBtn.onclick = resetAnswers;

    function render() {
      if (uiState.screen === "review") renderReview();
      else if (uiState.screen === "questionnaire") renderQuestionnaire();
      else renderWelcome();
    }

    render();
  </script>
</body>
</html>
